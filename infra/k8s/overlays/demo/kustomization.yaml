apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sbtm-demo

resources:
  - namespace.yaml
  - ../../base

# Demo: skip Ingress + cert-manager (no real DNS for *.sbtm.example.com).
# Verify services via kubectl port-forward instead. Re-add ingress once a
# real DNS name and TLS issuer are wired up.
patchesStrategicMerge: []

  # Demo: 1 replica for all deployments

  # Demo: debug log level and demo NODE_ENV

  # Demo: imagePullPolicy Always (always pull latest)

  # Demo: Key Vault uses demo vault name

  # Demo: SecretProviderClass placed in sbtm-demo namespace (overrides hard-coded sbtm-production)

  # Demo: ingress host
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: debug
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: demo
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,gps-tracking,emergency-alerts,student-presence,student-management,compliance-management,video-service,notification-service)
  # Demo: allow CORS from local dev frontends + deployed Static Web App portals
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CORS_ORIGINS
          value: "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,https://admin.sbtm.ca,https://parent.sbtm.ca,https://lemon-island-0633c2b10.7.azurestaticapps.net,https://salmon-water-0d21dfd10.7.azurestaticapps.net"
    target:
      kind: Deployment
      name: api-gateway
  # Demo: api-gateway proxies to downstream microservices via in-cluster DNS
  # (defaults are http://localhost:300x which only work in docker-compose dev)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ALERTS_SERVICE_URL
          value: "http://emergency-alerts"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GPS_SERVICE_URL
          value: "http://gps-tracking"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PRESENCE_SERVICE_URL
          value: "http://student-presence"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STUDENT_SERVICE_URL
          value: "http://student-management"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: VIDEO_SERVICE_URL
          value: "http://video-service"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: COMPLIANCE_SERVICE_URL
          value: "http://compliance-management"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSRM_BASE_URL
          value: "http://osrm"
    target:
      kind: Deployment
      name: api-gateway
  # Demo: inject Postgres connection settings (TypeORM services use individual DB_* vars)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_HOST
          value: sbtm-pg-demo.postgres.database.azure.com
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_PORT
          value: "5432"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_USERNAME
          value: sbtmadmin
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_DATABASE
          value: sbms
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_SSL
          value: "true"
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,emergency-alerts,student-presence,student-management,compliance-management,video-service,notification-service)
  # Demo: inject INTERNAL_SERVICE_SECRET (HMAC key for internal service-to-service JWTs).
  # Required by gps-tracking middleware (and used by libs/common internal-service-auth.guard).
  # All services that mint or verify internal tokens must share the same value.
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: INTERNAL_SERVICE_SECRET
          value: MB1vOUJ6d9qkwY9i4OfHpPkxoUVHjd0jDDZAWiO4
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,emergency-alerts,student-presence,student-management,compliance-management,video-service,notification-service,gps-tracking)
  # Demo: video-service requires STORAGE_BASE_URL (public download URL prefix
  # for uploaded media). In-cluster default points at the API gateway so the
  # parent app can resolve `${STORAGE_BASE_URL}/video/...` via api.sbtm.ca.
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: STORAGE_BASE_URL
          value: "https://api.sbtm.ca/api/v1/video"
    target:
      kind: Deployment
      name: video-service
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
  # Demo: services with global prefix `api/v1` need health probe path adjusted
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
        value: /api/v1/health
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
        value: /api/v1/health
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,notification-service,video-service)
  # Demo: OSRM has no /health endpoint - use TCP socket probes
  - patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/livenessProbe/httpGet
      - op: remove
        path: /spec/template/spec/containers/0/readinessProbe/httpGet
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe/tcpSocket
        value:
          port: 5000
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe/tcpSocket
        value:
          port: 5000
    target:
      kind: Deployment
      name: osrm
  - patch: |-
      - op: replace
        path: /spec/parameters/keyvaultName
        value: sbtm-kv-demo-temp
      - op: replace
        path: /spec/parameters/clientID
        value: 2348eb71-bcd5-4c3e-a4d2-6d5e9eda8e23
      - op: replace
        path: /spec/parameters/tenantId
        value: b13ceef6-6c21-40a4-ad1c-bbaac66921c2
    target:
      kind: SecretProviderClass
      name: sbtm-keyvault-secrets
  - patch: |-
      - op: replace
        path: /metadata/namespace
        value: sbtm-demo
    target:
      kind: SecretProviderClass
      name: sbtm-keyvault-secrets
  - patch: |-
      - op: replace
        path: /metadata/annotations/azure.workload.identity~1client-id
        value: 2348eb71-bcd5-4c3e-a4d2-6d5e9eda8e23
      - op: replace
        path: /metadata/annotations/azure.workload.identity~1tenant-id
        value: b13ceef6-6c21-40a4-ad1c-bbaac66921c2
    target:
      kind: ServiceAccount
      name: sbtm-workload-sa
  # Demo: bind ingress to api.sbtm.ca + Let's Encrypt cert via cert-manager.
  # The base ingress uses placeholder host api.sbtm.example.com — patch it
  # to the real domain. The deployed A record (api.sbtm.ca → LB IP) is set
  # by scripts/azure/bootstrap.sh step 12.
  - patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.sbtm.ca
      - op: replace
        path: /spec/rules/0/host
        value: api.sbtm.ca
    target:
      kind: Ingress
      name: sbtm-ingress
  # Demo: use Let's Encrypt STAGING issuer by default to avoid the production
  # rate limit (5 dup certs/FQDN/week, 50 certs/domain/week) during frequent
  # teardown/rebuild cycles. Staging certs are NOT browser-trusted; for a
  # real demo with a trusted cert, run:
  #   kubectl annotate -n sbtm-demo ingress/sbtm-ingress \
  #     cert-manager.io/cluster-issuer=letsencrypt-prod --overwrite
  #   kubectl delete -n sbtm-demo secret/sbtm-tls   # force re-issuance
  # Or set USE_PROD_CERT=true before running scripts/azure/bootstrap.sh
  # which will rewrite this patch to letsencrypt-prod.
  - patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-staging
    target:
      kind: Ingress
      name: sbtm-ingress
  - patch: |-
      - op: replace
        path: /spec/acme/email
        value: devops@sbtm.ca
    target:
      kind: ClusterIssuer
      name: letsencrypt-prod
  - patch: |-
      - op: replace
        path: /spec/acme/email
        value: devops@sbtm.ca
    target:
      kind: ClusterIssuer
      name: letsencrypt-staging

images:
  - name: sbtmacrdemo.azurecr.io/sbtm/api-gateway
    newName: sbtmacrshared.azurecr.io/sbtm/api-gateway
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/gps-tracking
    newName: sbtmacrshared.azurecr.io/sbtm/gps-tracking
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/emergency-alerts
    newName: sbtmacrshared.azurecr.io/sbtm/emergency-alerts
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/student-presence
    newName: sbtmacrshared.azurecr.io/sbtm/student-presence
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/student-management
    newName: sbtmacrshared.azurecr.io/sbtm/student-management
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/compliance-management
    newName: sbtmacrshared.azurecr.io/sbtm/compliance-management
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/video-service
    newName: sbtmacrshared.azurecr.io/sbtm/video-service
    newTag: latest
  - name: sbtmacrdemo.azurecr.io/sbtm/notification-service
    newName: sbtmacrshared.azurecr.io/sbtm/notification-service
    newTag: latest
labels:
  - includeSelectors: true
    pairs:
      environment: demo
