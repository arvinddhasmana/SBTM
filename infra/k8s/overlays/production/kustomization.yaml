apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sbtm-production

resources:
  - namespace.yaml
  - ../../base

    # Production: 2 replicas for standard services

    # Production: 3 replicas for api-gateway and emergency-alerts (higher traffic)

    # Production: info log level

    # Production: imagePullPolicy IfNotPresent (use cached images)

    # Production: higher resource requests and limits

    # Production: ingress host
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      labelSelector: app in (gps-tracking,student-presence,student-management,compliance-management,video-service,notification-service,osrm)
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,emergency-alerts)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: info
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,gps-tracking,emergency-alerts,student-presence,student-management,compliance-management,video-service,notification-service)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "1"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "1Gi"
    target:
      kind: Deployment
      labelSelector: app in (api-gateway,gps-tracking,emergency-alerts,student-presence,student-management,compliance-management,video-service,notification-service)
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.sbtm.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.sbtm.example.com
    target:
      kind: Ingress
      name: sbtm-ingress

images:
  - name: sbtmacrproduction.azurecr.io/sbtm/api-gateway
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/gps-tracking
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/emergency-alerts
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/student-presence
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/student-management
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/compliance-management
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/video-service
    newTag: latest
  - name: sbtmacrproduction.azurecr.io/sbtm/notification-service
    newTag: latest
labels:
  - includeSelectors: true
    pairs:
      environment: production
