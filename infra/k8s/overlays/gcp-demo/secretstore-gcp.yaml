# External Secrets Operator - SecretStore for GCP Secret Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: sbtm-secretstore-gcp
  namespace: sbtm-demo-gcp
spec:
  provider:
    gcpsm:
      projectID: "PROJECT_ID" # Replace with your GCP project ID
      auth:
        workloadIdentity:
          clusterLocation: us-central1 # Replace with your cluster region
          clusterName: sbtm-demo-gke # Replace with your cluster name
          serviceAccountRef:
            name: external-secrets

---
# External Secret - maps GCP Secret Manager secrets to K8s secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sbtm-secrets
  namespace: sbtm-demo-gcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: sbtm-secretstore-gcp
    kind: SecretStore
  target:
    name: sbtm-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: sbtm-demo-jwt-secret
    - secretKey: DB_PASSWORD
      remoteRef:
        key: sbtm-demo-db-password
    - secretKey: DATABASE_URL
      remoteRef:
        key: sbtm-demo-database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: sbtm-demo-redis-url
    - secretKey: FCM_SERVER_KEY
      remoteRef:
        key: sbtm-demo-fcm-server-key
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: sbtm-demo-twilio-auth-token
    - secretKey: STORAGE_BUCKET_NAME
      remoteRef:
        key: sbtm-demo-storage-bucket
