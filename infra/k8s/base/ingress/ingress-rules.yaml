# Ingress routing rules — routes all traffic through API Gateway
# Update host: field with your actual domain before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sbtm-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/use-regex: 'true'
    # WebSocket upgrade for Socket.IO (emergency alerts).
    # NGINX Ingress controller forwards Upgrade/Connection headers automatically
    # when the client sends them; long timeouts keep the WS connection alive.
    # The deprecated `configuration-snippet` annotation is disabled by default
    # in modern controllers (allow-snippet-annotations=false), so it is omitted.
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.sbtm.example.com # Replace with actual domain
      secretName: sbtm-tls
  rules:
    - host: api.sbtm.example.com # Replace with actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
---
# Let's Encrypt ClusterIssuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@sbtm.example.com # Replace with actual email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
