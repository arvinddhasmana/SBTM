# Ingress routing rules — routes all traffic through API Gateway
# Update host: field with your actual domain before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sbtm-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/use-regex: 'true'
    # WebSocket upgrade for Socket.IO (emergency alerts).
    # NGINX Ingress controller forwards Upgrade/Connection headers automatically
    # when the client sends them; long timeouts keep the WS connection alive.
    # The deprecated `configuration-snippet` annotation is disabled by default
    # in modern controllers (allow-snippet-annotations=false), so it is omitted.
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.sbtm.example.com # Replace with actual domain
      secretName: sbtm-tls
  rules:
    - host: api.sbtm.example.com # Replace with actual domain
      http:
        paths:
          # Socket.IO endpoint for emergency-alerts (server uses path
          # `/ws/alerts`). Routed directly to the service so the WebSocket
          # upgrade and namespace multiplexing don't have to traverse the
          # api-gateway.
          - path: /ws/alerts
            pathType: Prefix
            backend:
              service:
                name: emergency-alerts
                port:
                  number: 80
          # Socket.IO endpoint for student-presence (server uses path
          # `/ws/presence`).
          - path: /ws/presence
            pathType: Prefix
            backend:
              service:
                name: student-presence
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
---
# Let's Encrypt PRODUCTION ClusterIssuer
# Issues browser-trusted certs but is rate limited:
#   • 5 duplicate certs per FQDN per week
#   • 50 certs per registered domain (sbtm.ca) per week
# Use letsencrypt-staging during teardown/rebuild cycles to avoid hitting
# these limits — switch the ingress annotation cert-manager.io/cluster-issuer.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@sbtm.example.com # Replace with actual email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Let's Encrypt STAGING ClusterIssuer (use for build/teardown cycles).
# Certs issued here are NOT browser-trusted (curl needs -k, browsers warn),
# but the staging endpoint has FAR higher rate limits (~30k issuances/week)
# so the same FQDN can be re-issued hundreds of times safely. The demo
# overlay routes to this issuer by default; flip the patch to letsencrypt-prod
# only when you need a real demo with a browser-trusted cert.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: devops@sbtm.example.com # Replace with actual email
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: nginx
