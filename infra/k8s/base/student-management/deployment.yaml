apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-management
  labels:
    app: student-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-management
  template:
    metadata:
      labels:
        app: student-management
      annotations:
        azure.workload.identity/use: 'true'
    spec:
      serviceAccountName: sbtm-workload-sa
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: sbtm-keyvault-secrets
      containers:
        - name: student-management
          image: sbtmacrdemo.azurecr.io/sbtm/student-management:latest
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: sbtm-secrets
          env:
            - name: PORT
              value: '3004'
            - name: NODE_ENV
              value: 'production'
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '1'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
