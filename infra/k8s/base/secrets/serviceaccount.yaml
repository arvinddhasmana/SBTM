# ServiceAccount used by all SBTM workloads.
# The azure.workload.identity/client-id annotation is patched per environment
# in the kustomize overlay (overlays/demo, overlays/production).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sbtm-workload-sa
  labels:
    azure.workload.identity/use: 'true'
  annotations:
    azure.workload.identity/client-id: WORKLOAD_IDENTITY_CLIENT_ID
    azure.workload.identity/tenant-id: AZURE_TENANT_ID
