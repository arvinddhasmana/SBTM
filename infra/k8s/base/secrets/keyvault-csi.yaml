# SecretProviderClass — mounts Azure Key Vault secrets as volumes in pods
# Applied once per namespace; pods reference secretObjects by name.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sbtm-keyvault-secrets
  namespace: sbtm-production
spec:
  provider: azure
  parameters:
    usePodIdentity: 'false'
    useVMManagedIdentity: 'false'
    clientID: 'WORKLOAD_IDENTITY_CLIENT_ID' # replaced by provision-azure.sh / CI
    keyvaultName: 'sbtm-kv-production' # replaced by provision-azure.sh / CI
    tenantId: 'AZURE_TENANT_ID' # replaced by provision-azure.sh / CI
    objects: |
      array:
        - |
          objectName: sbtm-jwt-secret
          objectType: secret
        - |
          objectName: sbtm-db-password
          objectType: secret
        - |
          objectName: sbtm-database-url
          objectType: secret
        - |
          objectName: sbtm-redis-connection-string
          objectType: secret
        - |
          objectName: sbtm-fcm-server-key
          objectType: secret
        - |
          objectName: sbtm-twilio-auth-token
          objectType: secret
        - |
          objectName: sbtm-blob-connection-string
          objectType: secret
        - |
          objectName: sbtm-appinsights-connection-string
          objectType: secret
  secretObjects:
    - secretName: sbtm-secrets
      type: Opaque
      data:
        - objectName: sbtm-jwt-secret
          key: JWT_SECRET
        - objectName: sbtm-db-password
          key: DB_PASSWORD
        - objectName: sbtm-database-url
          key: DATABASE_URL
        - objectName: sbtm-redis-connection-string
          key: REDIS_URL
        - objectName: sbtm-fcm-server-key
          key: FCM_SERVER_KEY
        - objectName: sbtm-twilio-auth-token
          key: TWILIO_AUTH_TOKEN
        - objectName: sbtm-blob-connection-string
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: sbtm-appinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
