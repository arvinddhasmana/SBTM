version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: sbms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=dev_secret
      - GPS_SERVICE_URL=http://gps-tracking:3001
      - ALERTS_SERVICE_URL=http://emergency-alerts:3004
      - PRESENCE_SERVICE_URL=http://student-presence:3006
      - VIDEO_SERVICE_URL=http://video-service:3005
    depends_on:
      - redis

  student-presence:
    build: ./services/student-presence
    ports:
      - "3003:3003"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: mysecretpassword
      DB_DATABASE: sbms
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3003
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:


