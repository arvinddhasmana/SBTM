version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: sbms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_DATABASE=sbms
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRATION=24h
      - RATE_LIMIT_TTL=60000
      - RATE_LIMIT_MAX=100
      - HTTP_TIMEOUT=10000
      - GPS_SERVICE_URL=http://gps-tracking:3002
      - ALERTS_SERVICE_URL=http://emergency-alerts:3003
      - PRESENCE_SERVICE_URL=http://student-presence:3004
      - VIDEO_SERVICE_URL=http://video-service:3005
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gps-tracking:
    build:
      context: ./services/gps-tracking
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:mysecretpassword@postgres:5432/sbms
      - PORT=3002
    depends_on:
      postgres:
        condition: service_healthy

  emergency-alerts:
    build:
      context: ./services/emergency-alerts
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_DATABASE=sbms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  student-presence:
    build:
      context: ./services/student-presence
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_DATABASE=sbms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  video-service:
    build:
      context: ./services/video-service
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_DATABASE=sbms
      - STORAGE_TYPE=local
      - PORT=3005
    depends_on:
      postgres:
        condition: service_healthy

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  parent-app:
    build:
      context: ./apps/parent-app/web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
