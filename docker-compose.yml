name: sbtm

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_DATABASE:-sbms}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - RATE_LIMIT_TTL=${RATE_LIMIT_TTL:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-10000}
      - GPS_SERVICE_URL=http://gps-tracking:3002
      - ALERTS_SERVICE_URL=http://emergency-alerts:3003
      - PRESENCE_SERVICE_URL=http://student-presence:3004
      - VIDEO_SERVICE_URL=http://video-service:3005
      - STUDENT_SERVICE_URL=http://student-management:3006
      - COMPLIANCE_SERVICE_URL=http://compliance-management:3007
      - NOTIFICATION_SERVICE_URL=http://notification-service:3008
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174}
      - OSRM_BASE_URL=http://osrm:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gps-tracking:
    build:
      context: ./services/gps-tracking
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_DATABASE:-sbms}
      - PORT=3002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  emergency-alerts:
    build:
      context: .
      dockerfile: services/emergency-alerts/Dockerfile
    ports:
      - '3003:3003'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3003
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  student-presence:
    build:
      context: .
      dockerfile: services/student-presence/Dockerfile
    ports:
      - '3004:3004'
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  video-service:
    build:
      context: .
      dockerfile: services/video-service/Dockerfile
    ports:
      - '3005:3005'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - STORAGE_TYPE=local
      - PORT=3005
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy

  student-management:
    build:
      context: .
      dockerfile: services/student-management/Dockerfile
    ports:
      - '3006:3006'
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - api-gateway
      - student-management
      - compliance-management

  compliance-management:
    build:
      context: .
      dockerfile: services/compliance-management/Dockerfile
    ports:
      - '3007:3007'
    environment:
      - NODE_ENV=development
      - PORT=3007
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - '3008:3008'
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_DATABASE=${DB_DATABASE:-sbms}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3008
      - FCM_DRY_RUN=${FCM_DRY_RUN:-true}
      - EMAIL_DRY_RUN=${EMAIL_DRY_RUN:-true}
      - SMS_DRY_RUN=${SMS_DRY_RUN:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  parent-dashboard:
    build:
      context: ./apps/parent-dashboard/web
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - api-gateway

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    container_name: sbtm-osrm
    command: osrm-routed --algorithm mld /data/ottawa.osrm
    ports:
      - '5000:5000'
    volumes:
      - ./infra/osrm-data:/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - '16686:16686'
      - '4318:4318'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    restart: unless-stopped

volumes:
  postgres_data:
