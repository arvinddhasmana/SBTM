name: Parent App - CI

on:
  push:
    branches: [master, main, 'mobile/**']
    paths:
      - 'apps/parent-app-mobile/**'
      - '.github/workflows/parent-app-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/parent-app-mobile/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  test:
    name: Parent App - Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/parent-app-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'apps/parent-app-mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --coverage --maxWorkers=2

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./apps/parent-app-mobile/coverage/lcov.info
          flags: parent-app-mobile
          name: parent-app-mobile-coverage
        continue-on-error: true

  lint:
    name: Parent App - Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/parent-app-mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'apps/parent-app-mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx expo lint
        continue-on-error: true
