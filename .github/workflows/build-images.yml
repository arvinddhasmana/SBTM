name: Build and Push Images

on:
  workflow_call:
    inputs:
      sha_tag:
        description: 'Image tag (e.g. sha-abc1234)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha_tag:
        description: 'Image tag override (defaults to sha-<commit>)'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  build-images:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # Required for OIDC Azure login
      contents: read

    strategy:
      matrix:
        service:
          - { name: api-gateway, context: services/api-gateway }
          - { name: gps-tracking, context: services/gps-tracking }
          - { name: emergency-alerts, context: services/emergency-alerts }
          - { name: student-presence, context: services/student-presence }
          - { name: student-management, context: services/student-management }
          - { name: compliance-management, context: services/compliance-management }
          - { name: video-service, context: services/video-service }
          - { name: notification-service, context: services/notification-service }

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_DEMO_LOGIN_SERVER }}

      - name: Set image tag
        id: tag
        run: |
          SHA_TAG="${{ inputs.sha_tag }}"
          if [[ -z "${SHA_TAG}" ]]; then
            SHA_TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.ACR_DEMO_LOGIN_SERVER }}/sbtm/${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.tag.outputs.image }}:latest
          cache-from: type=registry,ref=${{ steps.tag.outputs.image }}:latest
          cache-to: type=inline
