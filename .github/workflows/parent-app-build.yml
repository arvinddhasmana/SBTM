name: Parent App - Mobile Build and Submit

on:
  release:
    types: [published]
  push:
    branches:
      - 'mobile/parent-app/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (android, ios, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  parent-app-build:
    name: Parent App - EAS Build & Submit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/parent-app-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: pnpm add -g eas-cli

      - name: EAS login
        run: eas login --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_PARENT_APP }}

      - name: Build Android (AAB)
        id: android-build
        if: |
          github.event_name == 'release' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == 'android' ||
          contains(github.ref, 'mobile/parent-app')
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --json | tee /tmp/android-build.json
          BUILD_ID=$(jq -r '.[0].id' /tmp/android-build.json)
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_PARENT_APP }}

      - name: Build iOS (IPA)
        id: ios-build
        if: |
          github.event_name == 'release' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == 'ios' ||
          contains(github.ref, 'mobile/parent-app')
        run: |
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --json | tee /tmp/ios-build.json
          BUILD_ID=$(jq -r '.[0].id' /tmp/ios-build.json)
          echo "build_id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_PARENT_APP }}

      - name: Submit Android to Play Store (internal testing)
        if: github.event_name == 'release' && steps.android-build.outputs.build_id
        run: |
          eas submit \
            --platform android \
            --profile production \
            --id ${{ steps.android-build.outputs.build_id }} \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_PARENT_APP }}
          GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_KEY_PARENT_APP }}

      - name: Submit iOS to TestFlight
        if: github.event_name == 'release' && steps.ios-build.outputs.build_id
        run: |
          eas submit \
            --platform ios \
            --profile production \
            --id ${{ steps.ios-build.outputs.build_id }} \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN_PARENT_APP }}

      - name: Notify build complete
        if: always()
        run: |
          echo "::notice::Parent App Build Complete"
          echo "Android Build ID: ${{ steps.android-build.outputs.build_id }}"
          echo "iOS Build ID: ${{ steps.ios-build.outputs.build_id }}"
