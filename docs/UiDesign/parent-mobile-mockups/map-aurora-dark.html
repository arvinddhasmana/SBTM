<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Map · Aurora Dark (Live)</title>
<link rel="stylesheet" href="_shared/glass.css">
</head><body>
<div class="device theme-dark">
  <div class="screen">
    <div class="map-bg"></div>

    <!-- SVG route polyline & connectors -->
    <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1" viewBox="0 0 390 844" preserveAspectRatio="none">
      <path d="M 60 700 C 100 600, 80 500, 150 440 S 280 360, 250 240 S 180 140, 320 110"
            fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity=".85" stroke-dasharray="0"/>
      <path d="M 60 700 C 100 600, 80 500, 150 440 S 280 360, 250 240 S 180 140, 320 110"
            fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".25" stroke-dasharray="6 10"/>
    </svg>

    <!-- Stops -->
    <div class="marker stop" style="left:46px;top:686px">1</div>
    <div class="marker stop child" style="left:138px;top:426px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span class="seq-badge">2</span>
    </div>
    <div class="marker stop" style="left:240px;top:226px">3</div>

    <!-- Bus marker (live, near child stop) -->
    <div class="marker bus" style="left:96px;top:520px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
    </div>

    <!-- School marker -->
    <div class="marker school" style="left:308px;top:96px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
    </div>

    <div class="statusbar"><span>9:41</span><span class="right">5G ▮▮▮ ▮</span></div>

    <!-- Top bar: back + title + icon buttons -->
    <div style="position:absolute;top:54px;left:14px;right:14px;z-index:10;display:flex;justify-content:space-between;gap:8px">
      <div class="row gap-8">
        <div class="icon-btn glass" title="Back">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <div class="glass row gap-8" style="padding:8px 12px;border-radius:14px">
          <div class="avatar" style="width:24px;height:24px;font-size:10px;background:linear-gradient(135deg,#22c55e,#10b981)">EL</div>
          <div class="col">
            <div style="font-size:12px;font-weight:600">Emma Lee</div>
            <div class="muted" style="font-size:10px">Route 12 · AM</div>
          </div>
        </div>
      </div>
      <div class="row gap-8">
        <div class="icon-btn glass" title="Recenter">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        </div>
        <div class="icon-btn glass" title="Refresh">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div class="glass" style="position:absolute;top:118px;left:14px;z-index:10;padding:10px 12px;border-radius:12px;font-size:11px">
      <div style="font-weight:700;font-size:10px;letter-spacing:.6px;text-transform:uppercase;opacity:.7;margin-bottom:6px">Legend</div>
      <div class="row gap-8" style="margin-bottom:4px"><span style="width:10px;height:10px;border-radius:50%;background:#3b82f6;display:inline-block"></span><span class="muted">Emma's stop</span></div>
      <div class="row gap-8" style="margin-bottom:4px"><span style="width:10px;height:10px;border-radius:50%;background:rgba(156,163,175,.5);border:1px solid rgba(156,163,175,.7);display:inline-block"></span><span class="muted">Other stops</span></div>
      <div class="row gap-8"><span style="width:10px;height:10px;border-radius:3px;background:#8b5cf6;display:inline-block"></span><span class="muted">School</span></div>
    </div>

    <!-- Bottom info sheet -->
    <div class="glass-strong" style="position:absolute;left:14px;right:14px;bottom:18px;z-index:10;border-radius:22px;padding:16px 18px">
      <div style="width:38px;height:4px;border-radius:4px;background:rgba(255,255,255,.2);margin:-4px auto 12px"></div>
      <div class="row between">
        <div class="col gap-6">
          <div style="font-size:16px;font-weight:700">Bus 14 · Route 12</div>
          <div class="muted" style="font-size:12px">Driver: M. Patel · 28 students aboard</div>
        </div>
        <span class="badge on_bus"><span class="ddot"></span>Live</span>
      </div>
      <div class="row gap-10" style="margin-top:14px">
        <div class="col" style="flex:1;padding:10px;border-radius:12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25)">
          <div class="muted" style="font-size:10px;letter-spacing:.5px;text-transform:uppercase">ETA</div>
          <div style="font-size:18px;font-weight:700;color:#22c55e">8 min</div>
        </div>
        <div class="col" style="flex:1;padding:10px;border-radius:12px;background:rgba(255,255,255,.04)">
          <div class="muted" style="font-size:10px;letter-spacing:.5px;text-transform:uppercase">Distance</div>
          <div style="font-size:18px;font-weight:700">1.2 km</div>
        </div>
        <div class="col" style="flex:1;padding:10px;border-radius:12px;background:rgba(255,255,255,.04)">
          <div class="muted" style="font-size:10px;letter-spacing:.5px;text-transform:uppercase">Stops left</div>
          <div style="font-size:18px;font-weight:700">2</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
